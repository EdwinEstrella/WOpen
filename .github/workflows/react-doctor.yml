name: React Doctor

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  react-doctor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run React Doctor
        run: npx react-doctor@latest --verbose --diff
