version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: whatsapp_postgres_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: whatsapp_bot
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: whatsapp_redis_cache
    restart: always
    volumes:
      - redisdata:/data

  app:
    build: .
    container_name: whatsapp_bot_app
    restart: always
    depends_on:
      - db
      - redis
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://user:password@db:5432/whatsapp_bot
      - REDIS_URL=redis://redis:6379
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - ./auth:/app/auth
      - ./data:/app/data

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
